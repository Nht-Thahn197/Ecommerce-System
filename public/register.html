<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng ký | Bambi</title>
    <link rel="icon" href="/ui/favicon-bambi.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./store.css?v=20260320-52" />
    <style>
      .auth-grid {
        margin-top: 24px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }
      .auth-card {
        background: white;
        border-radius: 16px;
        padding: 22px;
        box-shadow: var(--shadow);
        border: 1px solid var(--line);
        width: min(620px, 100%);
      }
      .auth-card h2 {
        margin: 0 0 8px;
        font-family: "Sora", sans-serif;
      }
      .auth-hero {
        background: linear-gradient(140deg, #ffe7df, #fff5f0);
        border-radius: 16px;
        padding: 24px;
        border: 1px solid var(--line);
        min-height: 320px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }
      .field label {
        font-size: 13px;
        color: var(--muted);
      }
      .input {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
      }
      .btn {
        background: var(--brand);
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
      }
      .status {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        background: var(--brand-soft);
        color: var(--brand-dark);
        display: none;
      }
      .status.error {
        background: #ffe5e5;
        color: #b91c1c;
      }
      @media (max-width: 900px) {
        .auth-grid {
          justify-content: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="container">
        <div class="top-links">
          <a href="/ui/shop-register.html">Kênh Người Bán</a>
          <span>Tải ứng dụng</span>
          <span>Kết nối</span>
        </div>
        <div class="top-actions">
          <div class="topbar-notification-menu" data-topbar-notification>
            <a
              class="topbar-notification-trigger"
              data-topbar-notification-trigger
              href="/ui/account.html#notifications"
              aria-label="Mở trang thông báo"
            >
              <span>Thông báo</span>
              <span class="topbar-notification-badge" data-topbar-notification-badge hidden>0</span>
            </a>
            <div
              class="topbar-notification-dropdown"
              data-topbar-notification-dropdown
              aria-label="Danh sách thông báo mới"
            >
              <div class="topbar-notification-head">Thông báo mới nhận</div>
              <div class="topbar-notification-status" data-topbar-notification-status hidden></div>
              <div class="topbar-notification-list" data-topbar-notification-list>
                <div class="topbar-notification-placeholder">Di chuột để xem thông báo mới.</div>
              </div>
              <a class="topbar-notification-footer" href="/ui/account.html#notifications">Xem tất cả</a>
            </div>
          </div>
          <span>Hỗ trợ</span>
          <span>Tiếng Việt</span>
        </div>
      </div>
    </div>

    <header class="header">
      <div class="container header-inner">
        <a class="logo" href="/ui/">
          <div class="logo-badge">B</div>
          <span>Bambi</span>
        </a>
        <div class="search-wrap">
          <input type="text" placeholder="Tìm sản phẩm, thương hiệu, và tên shop" />
          <button>Tìm</button>
        </div>
        <div class="header-actions">
          <a class="pill" href="/ui/login.html">Đăng nhập</a>
          <span class="pill">Đăng ký</span>
        </div>
      </div>
    </header>

    <main class="container">
      <div class="auth-grid">
        <div class="auth-card">
          <h2>Đăng ký</h2>
          <form id="registerForm">
            <div class="field">
              <label>Họ và tên</label>
              <input class="input" name="full_name" />
            </div>
            <div class="field">
              <label>Email</label>
              <input class="input" name="email" type="email" required />
            </div>
            <div class="field">
              <label>Số điện thoại (tuỳ chọn)</label>
              <input class="input" name="phone" />
            </div>
            <div class="field">
              <label>Mật khẩu</label>
              <input class="input" name="password" type="password" required />
            </div>
            <div class="field">
              <label>Nhập lại mật khẩu</label>
              <input class="input" name="confirm_password" type="password" required />
            </div>
            <button class="btn" type="submit">Tạo tài khoản</button>
            <div id="status" class="status"></div>
          </form>
        </div>
      </div>
    </main>

    <script>
      const form = document.querySelector("#registerForm");
      const statusEl = document.querySelector("#status");

      const setStatus = (message, type = "info") => {
        if (!message) {
          statusEl.style.display = "none";
          statusEl.textContent = "";
          statusEl.className = "status";
          return;
        }
        statusEl.style.display = "block";
        statusEl.textContent = message;
        statusEl.className = `status ${type === "error" ? "error" : ""}`;
      };

      const apiFetch = async (path, options = {}) => {
        const response = await fetch(path, {
          ...options,
          headers: { "Content-Type": "application/json" },
        });
        const text = await response.text();
        let payload;
        try {
          payload = text ? JSON.parse(text) : {};
        } catch (error) {
          payload = { message: text };
        }
        if (!response.ok) throw new Error(payload.message || "Đăng ký thất bại");
        return payload;
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus("");
        const full_name = form.full_name.value.trim();
        const email = form.email.value.trim();
        const phone = form.phone.value.trim();
        const password = form.password.value;
        const confirm = form.confirm_password.value;

        if (password !== confirm) {
          setStatus("Mật khẩu nhập lại không khớp.", "error");
          return;
        }

        try {
          await apiFetch("/auth/register", {
            method: "POST",
            body: JSON.stringify({
              email,
              password,
              full_name: full_name || undefined,
              phone: phone || undefined,
            }),
          });
          setStatus("Đăng ký thành công! Đang chuyển đến trang đăng nhập...");
          setTimeout(() => {
            window.location.href = "/ui/login.html";
          }, 1200);
        } catch (error) {
          setStatus(error.message, "error");
        }
      });
    </script>
    <script src="/ui/store.js?v=20260320-9"></script>
    <script src="/ui/custom-select.js"></script>
  </body>
</html>
