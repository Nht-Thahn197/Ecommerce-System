<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng nhập | Bambi</title>
    <link rel="icon" href="/ui/favicon-bambi.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./shared.css" />
    <style>
      body {
        background: radial-gradient(1000px 700px at 10% 10%, #fff6ed, transparent 60%),
          radial-gradient(900px 700px at 90% 5%, #ffe8d5, transparent 60%),
          #fff6ed;
      }

      .login-shell {
        max-width: 980px;
        margin: 24px auto 80px;
        padding: 0 20px;
      }

      .login-card {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--line);
        border-radius: 22px;
        box-shadow: var(--shadow);
        padding: 28px;
        display: grid;
        grid-template-columns: 1.1fr 1fr;
        gap: 22px;
      }

      .brand-panel {
        border-radius: 18px;
        padding: 22px;
        background: linear-gradient(135deg, #ff7a00 0%, #ffb266 100%);
        color: white;
        position: relative;
        overflow: hidden;
        min-height: 320px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .brand-panel::after {
        content: "";
        position: absolute;
        inset: auto -30% -40% auto;
        width: 320px;
        height: 320px;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.4), transparent 70%);
      }

      .brand-title {
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        font-size: 28px;
        margin: 0 0 6px;
      }

      .brand-sub {
        margin: 0;
        opacity: 0.9;
      }

      .badge-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .badge {
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.35);
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
      }

      .form-panel h2 {
        margin: 0 0 6px;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
      }

      .hint {
        color: var(--muted);
        margin-bottom: 18px;
      }

      .link {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }

      @media (max-width: 900px) {
        .login-card {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-shell">
      <header class="brand" style="margin-bottom: 18px">
        <h1>Đăng nhập</h1>
        <p>Truy cập nhanh vào mua sắm, đơn hàng và tài khoản.</p>
      </header>

      <div id="status" class="status" style="display: none"></div>

      <section class="login-card">
        <div class="brand-panel">
          <div>
            <h2 class="brand-title">Bambi Member</h2>
            <p class="brand-sub">Tích điểm, theo dõi đơn và ưu đãi riêng cho bạn.</p>
          </div>
          <div class="badge-row">
            <span class="badge">Freeship 0đ</span>
            <span class="badge">Ưu đãi mỗi ngày</span>
            <span class="badge">Hỗ trợ 24/7</span>
          </div>
        </div>
        <div class="form-panel">
          <h2>Đăng nhập tài khoản</h2>
          <p class="hint">Dùng email hoặc số điện thoại đã đăng ký.</p>
          <form id="loginForm">
            <div class="field">
              <label>Email hoặc số điện thoại</label>
              <input class="input" name="identifier" required />
            </div>
            <div class="field">
              <label>Mật khẩu</label>
              <input class="input" name="password" type="password" required />
            </div>
            <button class="btn" type="submit">Đăng nhập</button>
          </form>
          <p class="note">
            Chưa có tài khoản? <a class="link" href="/ui/register.html">Đăng ký ngay</a>
          </p>
        </div>
      </section>
    </div>

    <script>
      const statusEl = document.querySelector("#status");
      const form = document.querySelector("#loginForm");

      const storageKeys = {
        base: "bambi_user_base",
        token: "bambi_user_token",
        refresh: "bambi_user_refresh",
      };

      const setStatus = (message, type = "info") => {
        if (!message) {
          statusEl.style.display = "none";
          statusEl.textContent = "";
          statusEl.className = "status";
          return;
        }
        statusEl.style.display = "block";
        statusEl.textContent = message;
        statusEl.className = `status ${type === "error" ? "error" : ""}`;
      };

      const apiFetch = async (path, options = {}) => {
        const response = await fetch(path, {
          ...options,
          headers: { "Content-Type": "application/json" },
        });
        const text = await response.text();
        let payload;
        try {
          payload = text ? JSON.parse(text) : {};
        } catch (error) {
          payload = { message: text };
        }
        if (!response.ok) throw new Error(payload.message || "Đăng nhập thất bại");
        return payload;
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setStatus("");
        const identifier = form.identifier.value.trim();
        const password = form.password.value;
        try {
          const payload = await apiFetch("/auth/login", {
            method: "POST",
            body: JSON.stringify({ identifier, password }),
          });
          localStorage.setItem(storageKeys.base, window.location.origin);
          localStorage.setItem(storageKeys.token, payload.token);
          localStorage.setItem(storageKeys.refresh, payload.refresh_token);
          setStatus("Đăng nhập thành công. Đang chuyển về trang chủ...");
          setTimeout(() => {
            window.location.href = "/ui/";
          }, 800);
        } catch (error) {
          setStatus(error.message, "error");
        }
      });
    </script>
  </body>
</html>
