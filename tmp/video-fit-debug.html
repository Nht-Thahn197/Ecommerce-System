<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Video Fit Debug</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #f3f4f6;
      }

      .frame {
        width: 800px;
        height: 480px;
        margin: 24px auto;
        padding: 6px 14px;
        box-sizing: border-box;
        background: #151515;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .stage {
        flex: 1 1 auto;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        outline: 2px dashed #4ade80;
      }

      video {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 100%;
        display: block;
        object-fit: contain;
        object-position: center;
        background: #151515;
      }

      pre {
        width: 800px;
        margin: 0 auto 24px;
        padding: 16px;
        white-space: pre-wrap;
        background: white;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="stage" id="stage">
        <video
          id="video"
          controls
          playsinline
          preload="metadata"
          src="http://localhost:3000/ui/uploads/products/448badf3-38d3-4c06-84db-e8dcd9ff685c-1772998715395-959439007.mp4"
        ></video>
      </div>
    </div>
    <pre id="out">waiting...</pre>
    <script>
      const video = document.getElementById("video");
      const stage = document.getElementById("stage");
      const out = document.getElementById("out");

      const update = () => {
        const aspectRatio = video.videoWidth / video.videoHeight;
        const isPortrait = aspectRatio < 1;
        stage.style.width = "100%";
        stage.style.height = "100%";
        stage.style.aspectRatio = "";
        video.style.width = isPortrait ? "auto" : "100%";
        video.style.height = isPortrait ? "100%" : "auto";

        requestAnimationFrame(() => {
          const stageRect = stage.getBoundingClientRect();
          const videoRect = video.getBoundingClientRect();
          out.textContent = JSON.stringify(
            {
              videoWidth: video.videoWidth,
              videoHeight: video.videoHeight,
              isPortrait,
              stage: {
                width: stageRect.width,
                height: stageRect.height,
              },
              video: {
                width: videoRect.width,
                height: videoRect.height,
              },
              style: {
                width: video.style.width,
                height: video.style.height,
              },
            },
            null,
            2
          );
        });
      };

      if (video.readyState >= 1) {
        update();
      } else {
        video.addEventListener("loadedmetadata", update, { once: true });
        video.addEventListener("loadeddata", update, { once: true });
      }
    </script>
  </body>
</html>
